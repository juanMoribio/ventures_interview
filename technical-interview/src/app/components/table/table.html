<section class="mx-auto max-w-6xl px-6 py-24">

    <!-- Título -->
    <h1 class="text-center text-5xl font-bold leading-none text-gray-900 lg:text-7xl">
        <div [innerHTML]="'TABLE.TITLE' | translate"></div>
    </h1>

    <!-- Tabla -->

    <div class="mx-auto mt-16 max-w-5xl grid gap-y-6">
        <div class="grid grid-cols-[2fr_180px_180px] gap-x-8">
            <div></div>
            <div class="text-center text-xs font-semibold text-gray-500">
                {{"TABLE.NO_LINKED_HEAD" | translate}}
            </div>
            <div class="text-center text-xs font-semibold text-gray-500">
                {{"TABLE.LINKED_HEAD" | translate}}
            </div>
        </div>
        
        @for (item of rows(); track item) {
        
        <div class="grid grid-cols-[2fr_180px_180px]  gap-x-8 border-b border-gray-200">
            <!-- Texto -->
            <div class=" pb-4 text-sm text-gray-600">
                {{ 'TABLE.BENEFITS.'+item.text | translate }}
            </div>

            <!-- Columna izquierda -->
            <div class=" flex justify-center">
                @if (item.noLinkedBenefit) {
                <div class="h-7 w-7 rounded-full border-2 border-blue-700 ">
                    <mat-icon style="color: green;">
                        check
                    </mat-icon>
                </div>
                }
            </div>

            <!-- Columna derecha -->
            <div class=" flex justify-center">
                <div class="flex h-7 w-7 items-center justify-center rounded-full border-2 border-blue-700">
                    <mat-icon style="color: green;">
                        check
                    </mat-icon>
                </div>
            </div>
        </div>
        
        }
    </div>

    <!-- Botón -->
    <div class="mt-14 flex justify-center">
        <button matButton="filled" class="my-auto">{{'HEADER.LINK'|translate}}</button>
    </div>
</section>
